name: Refresh legislative data

# Runs the scrape pipeline against legis.la.gov and pushes the resulting SQL to
# remote D1. The plan calls for weekly refresh during a live session. Cron is in
# UTC (0 11 * * 1 ≈ 5-6 am Central depending on DST) — adjust if you want a
# different cadence.

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to scrape (e.g. 26RS)'
        required: true
        default: '26RS'
        type: string

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SESSION: ${{ github.event.inputs.session || '26RS' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      # Persist .scrape-cache so weekly runs only fetch deltas. The key changes when
      # the session input changes, so a different-session run gets its own cache.
      - name: Restore scrape cache
        uses: actions/cache@v4
        with:
          path: worker/.scrape-cache
          key: scrape-cache-${{ env.SESSION }}-${{ github.run_id }}
          restore-keys: |
            scrape-cache-${{ env.SESSION }}-

      - name: Scrape rosters (Senate + House)
        run: node scripts/scrape-rosters.mjs /tmp/rosters.sql

      - name: Push rosters to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/rosters.sql

      - name: Scrape Year Elected per member
        run: node scripts/scrape-term-dates.mjs

      - name: Push term dates to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/term_dates.sql

      - name: Scrape bills + roll-call metadata
        run: node --experimental-strip-types scripts/scrape-bills.mjs "$SESSION" "" /tmp/bills.sql

      - name: Push bills to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/bills.sql

      - name: Parse roll-call PDFs into per-member votes
        run: node --experimental-strip-types scripts/parse-rollcalls.mjs

      - name: Push per-member votes to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/rollcall_votes.sql

      - name: Scrape Wikipedia infoboxes for term_start / term_end
        run: node scripts/scrape-wiki-terms.mjs

      - name: Push term provenance to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/wiki_terms.sql
