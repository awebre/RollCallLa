name: Refresh legislative data

# Scrapes legis.la.gov + Wikipedia and pushes the resulting SQL to remote D1.
# Runs nightly during session windows; off-session, most fetches are cache hits
# so the cost stays bounded. Cron is in UTC (0 6 * * * ≈ midnight-1 am Central
# depending on DST).

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to scrape (e.g. 26RS)'
        required: true
        default: '26RS'
        type: string

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SESSION: ${{ github.event.inputs.session || '26RS' }}
      # Scripts that read from D1 honor this — locally defaults to --local,
      # in CI we want every SELECT to hit remote production.
      D1_TARGET: remote
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      # No cross-run scrape cache. Everything mutable (billinfo, votes-page HTML)
      # must be re-fetched each night to see new bills/roll-calls, and immutable
      # PDFs are skipped via D1's `roll_calls.pdf_doc_id` check inside the script
      # — they're never re-downloaded once their votes are in D1. The local
      # .scrape-cache/ dir still works for dev-time iteration; CI just doesn't
      # need it to persist between runs.

      # Mark any orphaned 'running' rows from a crashed-runner / force-cancelled
      # previous run as 'error' so the next 'finalize' step doesn't accidentally
      # close out the wrong row. The workflow's concurrency group serializes
      # refreshes, so anything still 'running' here is by definition abandoned.
      - name: Reap abandoned ingest_runs rows
        run: |
          npx wrangler d1 execute la_vote_tracker --remote --command "
            UPDATE ingest_runs
            SET status = 'error', finished_at = datetime('now'),
                error = 'abandoned (newer run started)'
            WHERE status = 'running';
          "

      # Scrape rosters first — this also upserts the session row that the rest
      # of the pipeline references via subquery.
      - name: Scrape rosters (Senate + House)
        run: node --experimental-strip-types scripts/scrape-rosters.mjs "$SESSION" /tmp/rosters.sql

      - name: Push rosters to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/rosters.sql

      # Record the start of this refresh AFTER rosters have created the session
      # row, so the FK is resolvable. status='running' first, finalized to
      # 'success' or 'error' at the end.
      - name: Record ingest start
        run: |
          npx wrangler d1 execute la_vote_tracker --remote --command "
            INSERT INTO ingest_runs (started_at, session_id, trigger, status)
            VALUES (
              datetime('now'),
              (SELECT id FROM sessions WHERE name='${{ env.SESSION }}'),
              '${{ github.event_name == 'schedule' && 'cron' || 'manual' }}',
              'running'
            );
          "

      - name: Scrape Year Elected per member
        run: node --experimental-strip-types scripts/scrape-term-dates.mjs "$SESSION" /tmp/term_dates.sql

      - name: Push term dates to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/term_dates.sql

      # Scrape chamber leadership (Speaker / President / President Pro Tem).
      # Must run after rosters since the SQL resolves legislators via (chamber, source_id).
      # parse-rollcalls reads session_leadership to attribute "Mr. Speaker" /
      # "Mr. President" / "Mr./Madam President Pro Tem" votes to the right person.
      - name: Scrape chamber leadership
        run: node --experimental-strip-types scripts/scrape-leadership.mjs "$SESSION" /tmp/leadership.sql

      - name: Push leadership to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/leadership.sql

      # Scrape committee membership — must run after rosters so (chamber, source_id)
      # lookups resolve.  Delete-then-insert per committee+session clears stale members.
      - name: Scrape committee membership
        run: node --experimental-strip-types scripts/scrape-committees.mjs "$SESSION" /tmp/committees.sql

      - name: Push committee membership to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/committees.sql

      - name: Scrape bills + pipeline status
        run: node --experimental-strip-types scripts/scrape-bills.mjs "$SESSION" "" /tmp/bills.sql

      - name: Push bills to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/bills.sql

      # Referral scraper reads bills from D1 + BillInfo.aspx action history.
      # Emits referrals SQL and a moi worklist for the committee votes scraper.
      - name: Scrape bill-committee referrals
        run: node --experimental-strip-types scripts/scrape-bill-referrals.mjs "$SESSION" --out /tmp/referrals.sql --moi-list /tmp/moi-list.json

      - name: Push bill-committee referrals to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/referrals.sql

      # Committee vote scraper reads the moi worklist from the previous step.
      - name: Scrape committee roll-call votes
        run: node --experimental-strip-types scripts/scrape-committee-votes.mjs "$SESSION" --moi-list /tmp/moi-list.json --out /tmp/committee_votes.sql

      - name: Push committee votes to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/committee_votes.sql

      # parse-rollcalls reads bills.docs_id from D1 to discover PDFs, so bills
      # must be pushed first. Output path matches the default OUT_PATH in the
      # script (which honors the --out flag if we need a different name).
      - name: Parse roll-call PDFs into per-member votes
        run: node --experimental-strip-types scripts/parse-rollcalls.mjs "$SESSION" --out /tmp/rollcall_votes.sql

      - name: Push per-member votes to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/rollcall_votes.sql

      - name: Scrape Wikipedia infoboxes for term_start / term_end
        run: node --experimental-strip-types scripts/scrape-wiki-terms.mjs "$SESSION" /tmp/wiki_terms.sql

      - name: Push term provenance to remote D1
        run: npx wrangler d1 execute la_vote_tracker --remote --file /tmp/wiki_terms.sql

      # Mark the most recent 'running' row as 'success' with current timestamp.
      # Done as the LAST step so it only fires when every prior step passed.
      - name: Record ingest success
        run: |
          npx wrangler d1 execute la_vote_tracker --remote --command "
            UPDATE ingest_runs
            SET finished_at = datetime('now'), status = 'success'
            WHERE id = (SELECT MAX(id) FROM ingest_runs WHERE status = 'running');
          "

      - name: Record ingest failure
        if: failure()
        run: |
          npx wrangler d1 execute la_vote_tracker --remote --command "
            UPDATE ingest_runs
            SET finished_at = datetime('now'), status = 'error',
                error = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            WHERE id = (SELECT MAX(id) FROM ingest_runs WHERE status = 'running');
          "

      # If anything in the pipeline failed, open an issue so the broken cron
      # is visible instead of silently serving stale data. Only fires on
      # scheduled runs to avoid noise from manual ad-hoc invocations.
      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const title = `refresh-data failed on ${new Date().toISOString().slice(0,10)}`;
            const body = [
              'The nightly data-refresh workflow failed. Stale data will be served until the next successful run.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure'],
            });
