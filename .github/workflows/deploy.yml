name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - name: Test
        run: npm test

      - name: Type check + dry-run deploy
        run: npm run check
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Sync geo assets to R2 (skips vintages already present)
        run: node scripts/upload-geo.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Migrations apply BEFORE deploy. If the migration succeeds but the deploy
      # step then fails, the DB ends up slightly ahead of the deployed Worker.
      # Acceptable because every migration we write is additive (new columns/
      # tables/indexes only — no drops or renames); the old code keeps working
      # against the new schema.
      - name: Apply pending D1 migrations (remote)
        run: npx wrangler d1 migrations apply la_vote_tracker --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build + deploy
        run: npm run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
